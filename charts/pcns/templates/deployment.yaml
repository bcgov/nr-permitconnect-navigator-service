{{ $dbHostName := .Values.config.configMap.SERVER_DB_HOST }}
{{ $dbSecretName := printf "%s-%s" (include "pcns.fullname" .) "passphrase" }}

{{- if .Values.patroni.enabled }}
{{ $dbHostName = include "patroni.fullname" .Subcharts.patroni }}
{{ $dbSecretName = include "patroni.fullname" .Subcharts.patroni }}
{{- end }}

{{- define "pcns.connectsTo" -}}
apiVersion: apps/v1
kind: StatefulSet
name: {{ include "patroni.fullname" .Subcharts.patroni }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pcns.fullname" . }}
  labels:
    {{- include "pcns.labels" . | nindent 4 }}
  {{- if .Values.patroni.enabled }}
  annotations:
    app.openshift.io/connects-to: '[{{ include "pcns.connectsTo" . | fromYaml | toJson }}]'
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 10

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      {{- include "pcns.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "pcns.selectorLabels" . | nindent 8 }}

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "pcns.serviceAccountName" . }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      #
      # OpenShift DeploymentConfig pre-hook replacement
      # Runs DB migrations before app containers start
      #
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}/{{ .Chart.Name }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          command:
            - /usr/local/bin/node
            - ./node_modules/knex/bin/cli.js
            - migrate:latest
            - --knexfile
            - ./sbin/knexfile.js

          env:
            - name: NODE_ENV
              value: production

            - name: SERVER_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  key: app-db-name
                  name: {{ $dbSecretName }}

            - name: SERVER_DB_HOST
              value: {{ $dbHostName | quote }}

            - name: SERVER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  key: app-db-username
                  name: {{ $dbSecretName }}

            - name: SERVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: app-db-password
                  name: {{ $dbSecretName }}

      containers:
        - name: app

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          image: "{{ .Values.image.repository }}/{{ .Chart.Name }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: {{ .Values.route.path }}
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: {{ .Values.route.path }}
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          env:
            - name: NODE_ENV
              value: production

            - name: SERVER_ATS_CLIENTID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-ats

            - name: SERVER_ATS_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-ats

            - name: SERVER_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  key: app-db-name
                  name: {{ $dbSecretName }}

            - name: SERVER_CHEFS_FORM1_ID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-form1

            - name: SERVER_CHEFS_FORM1_APIKEY
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-form1

            - name: SERVER_CHEFS_FORM2_ID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-form2

            - name: SERVER_CHEFS_FORM2_APIKEY
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-form2

            - name: SERVER_CHES_CLIENTID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-ches-service-account

            - name: SERVER_CHES_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-ches-service-account

            - name: SERVER_DB_HOST
              value: {{ $dbHostName | quote }}

            - name: SERVER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  key: app-db-username
                  name: {{ $dbSecretName }}

            - name: SERVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: app-db-password
                  name: {{ $dbSecretName }}

            - name: SERVER_OBJECTSTORAGE_ACCESSKEYID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-objectstorage

            - name: SERVER_OBJECTSTORAGE_SECRETACCESSKEY
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-objectstorage

            - name: SERVER_PEACH_CLIENTID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-peach

            - name: SERVER_PEACH_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-peach

            - name: SERVER_SSO_CLIENTID
              valueFrom:
                secretKeyRef:
                  key: username
                  name: {{ include "pcns.configname" . }}-sso

            - name: SERVER_SSO_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  key: password
                  name: {{ include "pcns.configname" . }}-sso

          envFrom:
            - configMapRef:
                name: {{ include "pcns.configname" . }}-config

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
